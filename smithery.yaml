# Smithery MCP server manifest — https://smithery.ai
# BuyWhere: Agent-native product catalog API for Southeast Asia commerce

name: buywhere
displayName: BuyWhere MCP Server
description: >
  Agent-native product catalog API. Search products across Shopee, Lazada, Amazon SG,
  Amazon US, Walmart, Carousell, FairPrice, Harvey Norman, and 20+ e-commerce platforms.
  Compare products, find deals, browse categories, and get the best price — all through
  a single MCP endpoint.

  📚 Read our engineering blog at https://buywhere.ai/blog for MCP server guides,
  ecommerce deep-dives, and agent-native commerce learnings.

version: 1.0.0
license: MIT

mcp:
  transport: stdio
  authentication:
    type: bearer
    description: >
      API key required. Get a free key at https://buywhere.ai/api-keys.
      Free tier: 1,000 calls/month. No credit card required.

tools:
  - name: search_products
    description: >
      Search the BuyWhere product catalog by keyword. Returns products from e-commerce platforms
      across multiple regions (Singapore, US, etc.). Supports price range, region, country, domain,
      and category filters. Use compact=true for agent-optimized responses.

  - name: get_product
    description: >
      Get a specific product by its ID, including full details and current price.

  - name: compare_products
    description: >
      Compare multiple products side-by-side (2–10 products). Returns price, brand, rating,
      and category for each product.

  - name: get_deals
    description: >
      Get discounted products sorted by discount percentage. Returns products with original price
      and discount percentage. Supports currency, region (sea, us, eu, au), and country filters.

  - name: list_categories
    description: >
      List top-level product categories available in the BuyWhere catalog.
      Supports country_code filter (SG, US, VN, TH, MY).

  - name: find_best_price
    description: >
      Find the best current price for a product by name across all merchants.
      Use this when a user asks "what's the best price for X" or "where can I buy X cheapest".

  - name: ingest_products
    description: >
      Batch-upsert up to 1000 products into the BuyWhere catalog from any merchant or source.
      Requires an API key with ingest permissions.

categories:
  - Commerce
  - Shopping
  - Price Comparison
  - Singapore
  - Southeast Asia

keywords:
  - shopping
  - ecommerce
  - price comparison
  - product search
  - singapore
  - southeast asia
  - shopee
  - lazada
  - amazon
  - ai agent
  - mcp
  - commerce api

author:
  name: BuyWhere
  email: api@buywhere.ai
  url: https://buywhere.ai

homepage: https://buywhere.ai
documentation: https://api.buywhere.ai/docs/guides/mcp
repository: https://github.com/BuyWhere/buywhere-mcp

startCommand:
  type: node
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: BuyWhere API Key
        description: Your BuyWhere API key. Get one free at https://buywhere.ai/api-keys
        x-sensitive: true
    required: [apiKey]
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@buywhere/mcp-server"],
      env: config.apiKey ? { BUYWHERE_API_KEY: config.apiKey } : {}
    })

supported_clients:
  - Claude Desktop
  - Cursor
  - VS Code Copilot
  - Custom MCP agents
  - LangChain
  - CrewAI
  - Mastra
  - AutoGen
  - Gemini

regions:
  - Singapore (SG)
  - United States (US)
  - Vietnam (VN)
  - Thailand (TH)
  - Malaysia (MY)

features:
  - Real-time product search across Singapore and US merchants
  - Cross-merchant price comparison
  - Discount/deal discovery
  - Category browsing
  - Multi-currency support (SGD, USD, MYR, IDR, THB, PHP, VND)
  - Region-filtered search
  - Compact JSON mode for AI agents
  - Free tier available (1,000 calls/month)
